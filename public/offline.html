<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#161848" />
    <title>Sin conexión</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 56px 20px; }
      .card { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,.08); border: 1px solid rgba(0,0,0,.06); }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { margin: 0; line-height: 1.6; color: #374151; }
      a { color: #161848; font-weight: 600; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .hint { margin-top: 14px; font-size: 14px; color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>No hay conexión a internet</h1>
        <p>La app está instalada y puede cargar algunos recursos, pero esta pantalla requiere conexión.</p>
        <p class="hint">Cuando vuelvas a tener señal, recarga esta página.</p>
        <p class="hint"><a href="/">Ir al inicio</a></p>
      </div>
    </div>
  </body>
</html>
